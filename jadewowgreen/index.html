<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./site/">
  <link rel="icon" href="images/uno1.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="images/uno1.jpg">
  <title>Jade Zhao Portfolio</title>
</head>
<body>
  <p aria-live="polite">Opening portfolio...</p>
  <script>
    const currentPath = window.location.pathname;
    const basePath = currentPath.endsWith('/index.html')
      ? currentPath.slice(0, -'index.html'.length)
      : (currentPath.endsWith('/') ? currentPath : `${currentPath}/`);
    window.location.replace(`${basePath}site/`);
  </script>
  <noscript>
    <p><a href="./site/">Open portfolio</a></p>
  </noscript>
</body>
</html>
