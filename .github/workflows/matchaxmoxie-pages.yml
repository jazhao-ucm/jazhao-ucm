# Deploy matchaxmoxie/ to GitHub Pages from the UCM monorepo.
# Repo → Settings → Pages → Source: GitHub Actions.

name: Deploy matchaxmoxie to Pages

on:
  push:
    branches:
      - main
    paths:
      - "matchaxmoxie/**"
      - ".github/workflows/matchaxmoxie-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-matchaxmoxie
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: matchaxmoxie

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
